name: Build EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: الحصول على الكود
      uses: actions/checkout@v4
      
    - name: تجهيز بايثون
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: تثبيت المكتبات
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: بناء الملف التنفيذي
      run: |
        pyinstaller --onefile --windowed --name "CafeAttendance" main.py
        
    - name: رفع الملف الناتج
      uses: actions/upload-artifact@v4
      with:
        name: CafeAttendance-EXE
        path: dist/CafeAttendance.exe
